<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#fafafa;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .login-box{
      width:350px;
      background:white;
      border:1px solid #dbdbdb;
      padding:40px;
      text-align:center;
    }

    .logo{
      font-size:45px;
      font-family:cursive;
      margin-bottom:35px;
      color:#262626;
    }

    input{
      width:100%;
      padding:10px;
      margin-bottom:8px;
      border:1px solid #dbdbdb;
      background:#fafafa;
      border-radius:3px;
      font-size:12px;
    }

    .login-btn{
      width:100%;
      background:#0095f6;
      color:white;
      border:none;
      padding:9px;
      border-radius:8px;
      font-weight:bold;
      margin-top:10px;
      cursor:pointer;
    }

    .divider{
      display:flex;
      align-items:center;
      margin:20px 0;
      color:#8e8e8e;
      font-size:13px;
      font-weight:bold;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:#dbdbdb;
    }

    .divider span{
      margin:0 15px;
    }

    .facebook-login{
      color:#385185;
      font-weight:bold;
      font-size:14px;
      text-decoration:none;
    }

    .forgot{
      display:block;
      margin-top:18px;
      font-size:12px;
      color:#00376b;
      text-decoration:none;
    }

    .signup-box{
      width:350px;
      background:white;
      border:1px solid #dbdbdb;
      margin-top:10px;
      padding:20px;
      text-align:center;
      font-size:14px;
    }

    .signup-box a{
      color:#0095f6;
      font-weight:bold;
      text-decoration:none;
    }

    @media(max-width:400px){
      .login-box,
      .signup-box{
        width:90%;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="login-box">

      <div class="logo">Instagram</div>

      <input type="text" placeholder="Phone number, username, or email">

      <input type="password" placeholder="Password">

      <button class="login-btn">Log in</button>

      <div class="divider">
        <span>OR</span>
      </div>

      <a href="#" class="facebook-login">
        Log in with Facebook
      </a>

      <a href="#" class="forgot">
        Forgot password?
      </a>

    </div>

    <div class="signup-box">
      Don't have an account?
      <a href="#">Sign up</a>
    </div>

  </div>

</body>
</html>
